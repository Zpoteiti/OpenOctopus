name: Python Server CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/py-server.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/py-server.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: openoctopus
          POSTGRES_PASSWORD: octopus
          POSTGRES_DB: openoctopus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create environment file
        run: cp .env.example .env

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy src

      - name: Run tests
        run: pytest -v
